name: CI
on: [push, pull_request]

# TODO: cache ~/Library/Developer/Xcode/DerivedData or use actions/cache keyed on Package.resolved once AppCore package grows dependencies

defaults:
  run:
    # explicitly set to bash to enable pipefail
    shell: bash

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Install Xcode Utilities
        run: brew install xcodegen xcbeautify
      - name: Generate project
        run: xcodegen generate
      - name: Build
        run: |
          xcodebuild build \
            -project Forge.xcodeproj \
            -scheme Forge \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            -skipMacroValidation \
            | xcbeautify

  test:
    runs-on: macos-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Install Xcode Utilities
        run: brew install xcodegen xcbeautify
      - name: Generate project
        run: xcodegen generate
      - name: Unit tests
        run: |
          xcodebuild test \
            -project Forge.xcodeproj \
            -scheme Forge \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            -only-testing:ForgeCoreTests \
            -resultBundlePath ForgeCoreTests.xcresult \
            | xcbeautify
      - name: UI tests
        run: |
          xcodebuild test \
            -project Forge.xcodeproj \
            -scheme Forge \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            -only-testing:AppUITests \
            -resultBundlePath AppUITests.xcresult \
            | xcbeautify
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: "*.xcresult"
          if-no-files-found: error
